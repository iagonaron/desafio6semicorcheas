<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafío de las 6 semicorcheas</title>
<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.3/build/cjs/vexflow.js"></script>
<style>
  :root{
    --bg:#0a0e16; --panel:rgba(17,24,38,0.72); --panel-solid:#0f1623;
    --ink:#eef2f8; --muted:#8a97ad; --line:rgba(255,255,255,0.10);
    --accent:#3b82f6; --accent-soft:rgba(59,130,246,0.16);
    --gold1:#d4af37; --gold2:#b8860b;
    --paper:#ffffff;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  html{background:#0a0e16;}
  body{
    margin:0; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:16px 22px; display:flex; flex-direction:column; min-height:100%;
    position:relative;
    background:
      radial-gradient(1200px 620px at 72% -12%, rgba(46,86,160,0.9), transparent 62%),
      radial-gradient(950px 540px at 8% 112%, rgba(30,60,120,0.85), transparent 58%),
      linear-gradient(160deg, #102449 0%, #0c1730 50%, #070d1e 100%);
  }
  #bgphoto{position:fixed; inset:0; z-index:0; object-fit:cover; width:100%; height:100%; opacity:0.5; filter:saturate(0.85);}
  #bgshade{position:fixed; inset:0; z-index:0; background:linear-gradient(180deg, rgba(16,36,73,0.55), rgba(9,16,34,0.82));}
  body > *:not(#bgphoto):not(#bgshade){position:relative; z-index:1;}

  header{display:flex; align-items:flex-start; justify-content:space-between; gap:20px; flex-wrap:nowrap; margin-bottom:8px;}
  h1{font-size:27px; font-weight:800; letter-spacing:-0.4px; margin:0; line-height:1.1; color:#fff;}
  .controls{display:flex; flex-direction:column; align-items:flex-end; gap:9px; flex-shrink:0;}
  .levels{display:inline-flex; background:rgba(0,0,0,0.35); border:1px solid var(--line); border-radius:12px; padding:4px; gap:3px; backdrop-filter:blur(8px);}
  .levels button{
    border:0; background:transparent; padding:7px 15px; border-radius:9px; cursor:pointer;
    font-size:13px; font-weight:600; color:var(--muted); transition:background .15s,color .15s;
  }
  .levels button:hover{color:#cfd8e6;}
  .levels button.active{background:var(--accent); color:#fff;}
  /* Leyenda: acento dorado degradado, estilo premium */
  .levels button.leyenda{
    color:var(--gold1);
    background:linear-gradient(135deg, rgba(212,175,55,0.18), rgba(184,134,11,0.10));
    box-shadow:inset 0 0 0 1px rgba(212,175,55,0.4);
  }
  .levels button.leyenda:hover{ color:#f0d57a; background:linear-gradient(135deg, rgba(212,175,55,0.30), rgba(184,134,11,0.18)); }
  .levels button.leyenda.active{ background:linear-gradient(135deg,var(--gold1),var(--gold2)); color:#1a1407; box-shadow:none; }
  .gen{display:flex; align-items:center; gap:10px; min-height:34px;}
  .gen .keybadge{font-size:14px; font-weight:700; padding:6px 12px; background:var(--accent-soft); color:#9cc4ff; border-radius:9px; border:1px solid rgba(59,130,246,0.35);}
  .gen button{
    border:0; background:var(--accent); color:#fff; padding:9px 16px; border-radius:10px;
    cursor:pointer; font-size:13px; font-weight:700;
  }
  .gen button:active{transform:translateY(1px);}
  .transport{display:flex; align-items:center; gap:8px;}
  .transport .tbtn{width:32px;height:32px;border:1px solid var(--line);background:rgba(255,255,255,0.06);border-radius:9px;cursor:pointer;font-size:16px;font-weight:700;color:var(--ink);}
  .transport .tbtn:hover{background:rgba(255,255,255,0.12);}
  .transport .tempo{font-size:13px;color:var(--muted);min-width:64px;text-align:center;}
  .transport .tempo b{color:#fff;font-size:15px;}
  .transport .play{border:0;background:var(--accent);color:#fff;padding:9px 17px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;}
  .transport .play.playing{background:#d0453a;}
  .hint{font-size:12px; color:var(--muted); margin:2px 0 10px;}
  /* partitura sobre panel blanco (notas negras), integrada en el entorno oscuro */
  #score{background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:8px 8px 12px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.35);}
  #score > div{line-height:0;}
  .bonuswrap{margin-top:2px;}
  .measure-hi{fill:rgba(59,130,246,0.16);}
  /* cuenta atrás */
  #countin{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(10,14,22,0.18);font-size:140px;font-weight:800;color:#fff;text-shadow:0 4px 24px rgba(0,0,0,0.8);z-index:50;pointer-events:none;}
  /* pantalla Bonus Track */
  #bonusScreen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:rgba(10,14,22,0.92);backdrop-filter:blur(8px);z-index:55;}
  #bonusScreen .bs-title{font-size:44px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,var(--gold1),var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  #bonusScreen .bs-count{position:absolute;top:36px;right:56px;font-size:96px;font-weight:800;color:#fff;}
  #bonusScreen .bs-score{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:14px 18px;box-shadow:0 10px 50px rgba(0,0,0,0.5);}
  @media (max-width:900px){ h1{font-size:22px;} }
</style>
</head>

const RANGE_LO=57, RANGE_HI=76; // A3..E5
function scaleSemis(mode){return mode==='major'?[0,2,4,5,7,9,11]:[0,2,3,5,7,8,11];}
function diatonic(key){const sc=scaleSemis(key.mode);const out=[];for(let m=RANGE_LO;m<=RANGE_HI;m++){if(sc.includes(((m-key.tonic)%12+12)%12))out.push(m);}return out;}
function degreeOf(m,key){const sc=scaleSemis(key.mode);const i=sc.indexOf(((m-key.tonic)%12+12)%12);return i<0?null:i+1;}
function isStable(m,key){const d=degreeOf(m,key);return d===1||d===3||d===5;}
function isLeading(m,key){return degreeOf(m,key)===7;}
function tonics(key){const out=[];for(let m=RANGE_LO;m<=RANGE_HI;m++)if(((m-key.tonic)%12+12)%12===0)out.push(m);return out;}
function stepN(m,key){const ds=diatonic(key),i=ds.indexOf(m),r=[];if(i+1<ds.length)r.push(ds[i+1]);if(i-1>=0)r.push(ds[i-1]);return r;}
function stepDir(m,key,d){const ds=diatonic(key),i=ds.indexOf(m),r=[];if(d>=0&&i+1<ds.length)r.push(ds[i+1]);if(d<=0&&i-1>=0)r.push(ds[i-1]);return r;}
function leaps(m,key,mx){const ds=diatonic(key),i=ds.indexOf(m),r=[];for(let k=2;k<=mx;k++){if(i+k<ds.length)r.push(ds[i+k]);if(i-k>=0)r.push(ds[i-k]);}return r;}
function pick(a,rng){return a[Math.floor(rng()*a.length)];}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

function genMeasure(cellArr,key,rng,opts){

  let leapBudget=1;

  const beat2StartIdx = cellArr.length;

    const t=flat[i];

    const apoyo=(i===beat2StartIdx); let midi;

      if(opts.startMidi!=null)midi=opts.startMidi;
      else if(opts.prevMidi!=null){const c=stepN(opts.prevMidi,key);midi=pick(c.length?c:diatonic(key),rng);}

      // ¿la regla permitiría salto aquí (por figura/silencio)?
      let canLeapHere;
      if(apoyo) canLeapHere = gap||pfig==='C'||pfig==='Cdot';
      else if(t.fig==='SC') canLeapHere = !(pfig==='SC'&&!gap);
      else { canLeapHere = gap||pfig==='C'||pfig==='Cdot'; }
      // sólo se permite salto si además queda presupuesto en el compás
      const allowLeap = canLeapHere && leapBudget>0;

      let cands;
      if(pendingComp!==0){
        // estamos obligados a compensar el salto anterior por grado conjunto en dirección -salto
        const comp=stepDir(prev,key,pendingComp);
        cands = comp.length?comp : stepN(prev,key);
        pendingComp=0; // compensado
      } else if(!allowLeap){
        cands=stepN(prev,key);
      } else {
        // candidatos de salto (3ª/4ª) — los marcamos para decidir luego
        cands=leaps(prev,key,3).concat(stepN(prev,key));
      }
      if(!cands.length)cands=diatonic(key);

      // preferencia tonal del apoyo
      if(apoyo){
        const stable=cands.filter(m=>isStable(m,key));
        const soft=cands.filter(m=>{const d=degreeOf(m,key);return d===2||d===6;});
        const r=rng();
        if(stable.length&&r<0.82)cands=stable;
        else if(soft.length&&r<0.97)cands=soft;
        else{const nl=cands.filter(m=>!isLeading(m,key)&&degreeOf(m,key)!==4);if(nl.length)cands=nl;}
      }
      midi=pick(cands,rng);

      // ¿fue salto?
      const ds=diatonic(key);const sd=ds.indexOf(midi)-ds.indexOf(prev);
      if(Math.abs(sd)>=2){
        leapBudget--;                       // consumimos el único salto del compás
        // si NO es el salto 1ª->2ª nota, hay que compensar después en sentido contrario
        if(soundingCount>2) pendingComp=-Math.sign(sd);
        else pendingComp=-Math.sign(sd);    // aun en 1ª->2ª compensamos después (suena mejor); antes no aplica
      }
    }
    ev.push({midi,fig:t.fig,rest:false,tuplet:t.tuplet});
    prev=midi;gap=false;pfig=t.fig;
  }
  return ev;
}
function genSystem(cells,key,rng,forceTonicEnds,beat2List){
  const tn=tonics(key); const startT=pick(tn,rng);
  const ms=[]; let prev=null;
  for(let i=0;i<cells.length;i++){
    const isFirst=i===0,isLast=i===cells.length-1;
    const b2=beat2List?beat2List[i]:null;
    const opts={prevMidi:prev}; if(isFirst&&forceTonicEnds)opts.startMidi=startT; if(b2)opts.beat2=b2;
    let m=genMeasure(cells[i],key,rng,opts);
    if(isLast&&forceTonicEnds){
      let bestM=m, bestCost=1e9;
      for(let attempt=0; attempt<24; attempt++){
        const cand = attempt===0 ? m : genMeasure(cells[i],key,rng,Object.assign({prevMidi:prev},b2?{beat2:b2}:{}));
        let ai=cand.length-1; while(ai>=0&&cand[ai].midi===null)ai--;
        const pv=ai>0 ? (function(){let pj=ai-1;while(pj>=0&&cand[pj].midi===null)pj--;return cand[pj]?cand[pj].midi:cand[ai].midi;})() : cand[ai].midi;
        const dsl=diatonic(key);
        let bt=tn[0], bd=1e9;
        for(const t of tn){const d=Math.abs(dsl.indexOf(t)-dsl.indexOf(pv));if(d<bd){bd=d;bt=t;}}
        if(bd<bestCost){bestCost=bd;bestM=cand.map(e=>({...e}));bestM[ai]={...bestM[ai],midi:bt};}
        if(bd<=1) break;
      }
      m=bestM;
    }
    ms.push(m);
    let k=m.length-1;while(k>=0&&m[k].midi===null)k--;prev=m[k].midi;
  }
  return ms;
}

/* === PRINCIPIANTE: escala ascendente por grados conjuntos, transponible === */
// Construye una escalera ascendente de 11 notas diatónicas desde la tónica de la tonalidad.
function ladderFor(key){
  const sc=scaleSemis(key.mode);
  // empezar en la tónica más grave dentro de un registro cómodo (sobre A3=57)
  let start=key.tonic;
  while(start<57) start+=12;       // asegurar >= A3
  while(start-12>=57) start-=12;   // la más grave posible >= A3
  const ladder=[]; let m=start, gi=0;
  while(ladder.length<11){
    const rel=((m-key.tonic)%12+12)%12;
    if(sc.includes(rel)) ladder.push(m);
    m++;
  }
  return ladder;
}
function buildPrincipianteMeasure(cellArr, ladder){
  const flat=cellArr.map(t=>({...t})).concat([{fig:'Ndot',rest:false}]);
  const ev=[]; let deg=0;
  for(const t of flat){
    if(t.rest){ev.push({midi:null,fig:'SC',rest:true});continue;}
    ev.push({midi:ladder[deg++],fig:t.fig==='Ndot'?'Ndot':t.fig,rest:false});
  }
  return ev;
}
function buildPrincipiante(keyIndex){
  const key = KEYS[(keyIndex==null?0:keyIndex)];
  const ladder=ladderFor(key);
  const out={};
  for(const s of ['s1','s2','s3','s4','bonus']) out[s]=STRUCT[s].map(c=>buildPrincipianteMeasure(c,ladder));
  return {key,systems:out,noBonus:true,bonusScreen:true};
}

/* =========================================================
   RENDER con VexFlow
   ========================================================= */
const VF = Vex.Flow;
let MEASURES=[]; // registro de compases para el metrónomo
let CURRENT_MODEL=null; // modelo en pantalla (para la pantalla Bonus Track)
// Deletreo correcto de cada clase de altura (0..11) según la tonalidad.
// Para cada tonalidad indicamos el nombre de letra preferido por pitch-class.
function spellingFor(key){
  const SHARP={0:'c',1:'c#',2:'d',3:'d#',4:'e',5:'f',6:'f#',7:'g',8:'g#',9:'a',10:'a#',11:'b'};
  const FLAT ={0:'c',1:'db',2:'d',3:'eb',4:'e',5:'f',6:'gb',7:'g',8:'ab',9:'a',10:'bb',11:'b'};
  const flatKeys=['F','Dm','Bb','Gm'];
  const useFlat=flatKeys.includes(key.vfKey);
  const base=Object.assign({},useFlat?FLAT:SHARP);
  // La sensible de un tono menor (VII grado, a 11 semitonos de la tónica = 1 semitono bajo la tónica)
  // debe escribirse como alteración (sostenido) de la nota natural inferior, nunca como bemol de la tónica.
  if(key.mode==='minor'){
    const leadPc=((key.tonic-1)%12+12)%12; // pitch-class de la sensible
    // forzar deletreo con sostenido del grado inferior
    const SHARPNAME={0:'c',1:'c#',2:'d',3:'d#',4:'e',5:'f',6:'f#',7:'g',8:'g#',9:'a',10:'a#',11:'b'};
    base[leadPc]=SHARPNAME[leadPc];
    // caso especial: si la sensible cae en una pitch-class que normalmente sería natural+#,
    // y la tónica es Sol m (tonic pc=7) -> sensible pc=6 -> 'f#' correcto (Fa#), no Solb. OK.
    // Re m (tonic pc=2) -> sensible pc=1 -> 'c#' (Do#), no Reb. OK.
    // La m (tonic pc=9) -> sensible pc=8 -> 'g#' (Sol#). OK.
    // Mi m (tonic pc=4) -> sensible pc=3 -> 'd#' (Re#). OK.
    // Si m (tonic pc=11)-> sensible pc=10-> 'a#' (La#). OK.
  }
  return base;
}
function midiToVFkeyed(m,key){
  const sp=spellingFor(key);
  const name=sp[((m%12)+12)%12];
  const oct=Math.floor(m/12)-1;
  // el octavado en VexFlow es por la letra; para 'cb'/'b#' no usamos, así que ok
  return name+'/'+oct;
}
// duración VexFlow: SC=16, C=8, Cdot=8d, Ndot=qd ; silencios add 'r'
function vfDuration(fig){
  if(fig==='SC')return '16';
  if(fig==='C')return '8';
  if(fig==='Cdot')return '8d';
  if(fig==='N')return 'q';
  if(fig==='Ndot')return 'qd';
  if(fig==='Cdos')return '8';   // corchea (dentro de un dosillo 2:3)
  return '16';
}
function makeNote(e,key,stemDir,clefType){
  const dur=vfDuration(e.fig);
  if(e.rest){
    // silencio de semicorchea: lo alejamos del corchete según la dirección del grupo.
    // corchete arriba (stemDir=1) -> silencio más abajo; corchete abajo (stemDir=-1) -> más arriba.
    let rk;
    if(clefType==='bass'){
      rk = stemDir===1 ? 'a/2' : (stemDir===-1 ? 'f/3' : 'd/3');
    } else {
      rk = stemDir===1 ? 'f/4' : (stemDir===-1 ? 'd/5' : 'b/4');
    }
    return new VF.StaveNote({keys:[rk],duration:'16r',clef:clefType||'treble'});
  }
  const cfg={keys:[midiToVFkeyed(e.midi,key)],duration:dur,clef:clefType||'treble'};
  if(stemDir===1) cfg.stem_direction=1;
  else if(stemDir===-1) cfg.stem_direction=-1;
  else cfg.auto_stem=true;
  const sn=new VF.StaveNote(cfg);
  if(e.fig==='Cdot'||e.fig==='Ndot') sn.addModifier(new VF.Dot(),0);
  return sn;
}

function renderMeasureInto(context, x, y, width, measureEvents, key, opts){
  opts=opts||{};
  const keySig=key.vfKey;
  const clefType=opts.clefType||'treble';
  const stave=new VF.Stave(x,y,width);
  if(opts.clef) stave.addClef(clefType);
  if(opts.time) stave.addTimeSignature('6/8');
  if(opts.keysig && keySig) stave.addKeySignature(keySig);
  if(opts.endBar) stave.setEndBarType(VF.Barline.type.END);
  stave.setContext(context).draw();
  const CENTER = clefType==='bass' ? 50 : 71;

  // unidades en semicorcheas. Cdos: dos corcheas de dosillo ocupan el pulso (6) -> 3 c/u.
  const UNITS={SC:1,C:2,Cdot:3,N:4,Ndot:6,Cdos:3};
  const groups=[];           // cada grupo: {idxs:[...], stemDir}
  let pos=0, cur=[], curPulse=null;
  const closeGroup=()=>{
    if(cur.length){
      // recortar silencios de los extremos
      let a=0,b=cur.length-1;
      while(a<cur.length && measureEvents[cur[a]].rest) a++;
      while(b>=0 && measureEvents[cur[b]].rest) b--;
      const trimmed=cur.slice(a,b+1);
      const real=trimmed.filter(i=>!measureEvents[i].rest);
      if(real.length>=2){
        // dirección de plica unificada: según la nota media respecto a la 3ª línea (Si4=71)
        const mids=real.map(i=>measureEvents[i].midi);
        const avg=mids.reduce((x,y)=>x+y,0)/mids.length;
        const hi=Math.max(...mids), lo=Math.min(...mids);
        const farUp=hi-CENTER, farDown=CENTER-lo;
        let stemDir;
        if(farUp>farDown) stemDir=-1;
        else if(farDown>farUp) stemDir=1;
        else stemDir = (avg>=CENTER)?-1:1;
        groups.push({idxs:trimmed, real, stemDir});
      }
    }
    cur=[]; curPulse=null;
  };
  measureEvents.forEach((e,i)=>{
    const dur=UNITS[e.fig]||1;
    const pulse=Math.floor(pos/6);
    if(e.fig==='Ndot'||e.fig==='N'){ closeGroup(); }  // negra y negra c/punt no llevan corchete
    else{
      if(curPulse!==null && pulse!==curPulse) closeGroup();
      if(curPulse===null) curPulse=pulse;
      cur.push(i);
    }
    pos+=dur;
  });
  closeGroup();

  // mapa idx->stemDir para construir notas (incluye silencios puente, para alejarlos del corchete)
  const stemOf={};
  groups.forEach(g=>g.idxs.forEach(i=>{ stemOf[i]=g.stemDir; }));

  // --- 2) Construir notas con la dirección de plica del grupo ---
  const notes=measureEvents.map((e,i)=>makeNote(e,key, stemOf[i]||0, clefType));

  // Si un grupo contiene un silencio puente, alargamos las plicas de sus notas
  // para empujar el corchete lejos del silencio y evitar el solape.
  groups.forEach(g=>{
    const hasRest = g.idxs.some(i=>measureEvents[i].rest);
    if(!hasRest) return;
    g.idxs.forEach(i=>{
      if(measureEvents[i].rest) return;
      const n=notes[i];
      if(n && typeof n.setStemLength==='function'){
        n.setStemLength(52); // por defecto ~35; lo alargamos
      }
    });
  });

  // --- 3) Crear los beams a partir de los grupos ---
  const beams=groups.map(g=>{
    const slice=g.idxs.map(i=>notes[i]);
    return new VF.Beam(slice);
  });

  // --- 3b) Tuplets (dosillo de corcheas 2:3) ---
  const tuplets=[];
  let di=[];
  measureEvents.forEach((e,i)=>{
    if(e.fig==='Cdos'){ di.push(i); }
    else { if(di.length){ tuplets.push(di.slice()); di=[]; } }
  });
  if(di.length) tuplets.push(di);
  const tupletObjs=tuplets.filter(g=>g.length>=2).map(g=>{
    const tnotes=g.map(i=>notes[i]);
    return new VF.Tuplet(tnotes,{num_notes:2,notes_occupied:3,bracketed:true,ratioed:false});
  });

  const voice=new VF.Voice({num_beats:6,beat_value:8}).setMode(VF.Voice.Mode.SOFT);
  voice.addTickables(notes);
  // accidentales respetando la armadura
  VF.Accidental.applyAccidentals([voice], keySig);
  // margen izq: clave+armadura ocupan espacio; margen der: dejar aire antes de la barra
  const leftPad = opts.clef ? 76 : 18;
  const rightPad = 22;
  const fmtWidth = Math.max(60, width - leftPad - rightPad);
  new VF.Formatter().joinVoices([voice]).format([voice], fmtWidth);
  voice.draw(context,stave);
  beams.forEach(b=>b.setContext(context).draw());
  tupletObjs.forEach(t=>t.setContext(context).draw());
  return {stave, x, y, width};
}

function clear(el){while(el.firstChild)el.removeChild(el.firstChild);}

function renderScore(model, level){
  const root=document.getElementById('score');
  clear(root);
  MEASURES=[];   // reinicia el registro de compases (metrónomo)
  CURRENT_MODEL=model;

  const W = Math.max(900, root.clientWidth-20);
  const sysOrder=['s1','s2','s3','s4'];
  const labelMap={s1:SYS_LABELS.s1,s2:SYS_LABELS.s2,s3:SYS_LABELS.s3,s4:null};

  const SYS_H=320;     // lienzo de trabajo amplio; luego recortamos al contenido real
  const STAVE_Y=150;   // pentagrama centrado en el lienzo amplio
  const clefW=64;
  const PAD=14;        // margen alrededor del contenido al recortar

  sysOrder.forEach((sk,si)=>{
    const measures=model.systems[sk];
    const host=document.createElement('div');
    host.style.lineHeight='0';
    root.appendChild(host);
    const renderer=new VF.Renderer(host,VF.Renderer.Backends.SVG);
    renderer.resize(W,SYS_H);
    const ctx=renderer.getContext();
    const svg=host.querySelector('svg');

    const n=measures.length;
    const usable=W-16;
    const firstW=Math.floor((usable-clefW)/n)+clefW;
    const restW=Math.floor((usable-clefW)/n);
    let x=8;
    measures.forEach((m,mi)=>{
      const isFirst=mi===0;
      const w=isFirst?firstW:restW;
      const lastOfDoc = model.noBonus && si===3 && mi===n-1;
      const geo=renderMeasureInto(ctx,x,STAVE_Y,w,m,model.key,{
        clef:isFirst,
        time: si===0 && mi===0,
        keysig:isFirst,
        endBar: lastOfDoc,
        clefType: (model.clefs&&model.clefs[sk])||'treble'
      });
      MEASURES.push({svg, x:geo.x, y:STAVE_Y, w:geo.width});
      x+=w;
    });
    fitSvgToContent(svg, W, PAD);
  });

  // --- Bonus final: isla aparte (no existe en Avanzado) ---
  if(!model.noBonus && model.systems.bonus){
    const bhost=document.createElement('div');bhost.className='bonuswrap';bhost.style.lineHeight='0';
    root.appendChild(bhost);
    const brenderer=new VF.Renderer(bhost,VF.Renderer.Backends.SVG);
    const bonusW=460;
    brenderer.resize(bonusW,SYS_H); const bctx=brenderer.getContext();
    const bm=model.systems.bonus; let bx=8;
    const bw0=Math.floor((bonusW-16-clefW)/2)+clefW;
    const bw1=Math.floor((bonusW-16-clefW)/2);
    bm.forEach((m,mi)=>{
      const geo=renderMeasureInto(bctx,bx,STAVE_Y,mi===0?bw0:bw1,m,model.key,{
        clef:mi===0, time:false, keysig:mi===0, endBar:mi===bm.length-1
      });
      MEASURES.push({svg:bhost.querySelector('svg'), x:geo.x, y:STAVE_Y, w:geo.width});
      bx+=mi===0?bw0:bw1;
    });
    fitSvgToContent(bhost.querySelector('svg'), bonusW, PAD);
  }
}

// Recorta el SVG al contenido real dibujado (evita recortes y solapamientos entre sistemas).
function fitSvgToContent(svg, width, pad){
  try{
    const bb=svg.getBBox();
    const top=Math.max(0, bb.y-pad);
    const h=bb.height+2*pad;
    svg.setAttribute('viewBox', `0 ${top} ${width} ${h}`);
    svg.setAttribute('height', h);
    svg.setAttribute('width', width);
    svg.style.height=h+'px';
    svg.style.width=width+'px';
  }catch(e){/* getBBox puede fallar si está oculto; se deja el tamaño por defecto */}
}

function addSvgLabel(svg,x,y,text,opts){
  opts=opts||{};
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',x); t.setAttribute('y',y);
  if(opts.italic)t.setAttribute('font-style','italic');
  t.setAttribute('font-size','14');
  t.setAttribute('font-weight',opts.bold?'700':'400');
  t.setAttribute('fill','#1A1A1A');
  t.textContent=text;
  svg.appendChild(t);
}

let currentLevel='principiante';
let princKeyIndex=Math.floor(Math.random()*KEYS.length); // tonalidad inicial aleatoria
let interSeed=Math.floor(Math.random()*1e9);
let advSeed=Math.floor(Math.random()*1e9);
let legSeed=Math.floor(Math.random()*1e9);

function buildIntermedio(seed){
  const rng=mulberry32(seed);
  const key=KEYS[Math.floor(rng()*KEYS.length)];
  const systems={};
  for(const s of ['s1','s2','s3','s4']) systems[s]=genSystem(STRUCT[s],key,rng,true);
  systems.bonus=genSystem(STRUCT.bonus,key,rng,true);
  return {key,systems,noBonus:true,bonusScreen:true};
}

// Avanzado: mismos ritmos que intermedio pero barajados por compases.
// Pool = 22 células (20 sistemas + 2 bonus). Se barajan, se quitan 2 -> 20.
// Se reparten en 4 sistemas de 5. Sin bonus aparte.
function shuffle(arr,rng){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildAvanzado(seed){
  const rng=mulberry32(seed);
  const key=KEYS[Math.floor(rng()*KEYS.length)];
  const pool=[];
  for(const s of ['s1','s2','s3','s4','bonus']) STRUCT[s].forEach(c=>pool.push(c));
  const shuffled=shuffle(pool,rng).slice(0,20);
  const systems={};
  ['s1','s2','s3','s4'].forEach((sk,i)=>{
    const cells=shuffled.slice(i*5,i*5+5);
    systems[sk]=genSystem(cells,key,rng,true);
  });
  return {key,systems,noBonus:true};
}

// Variantes del 2º pulso (cada una suma un pulso = 6 semicorcheas)
const BEAT2 = {
  Ndot: [{fig:'Ndot',rest:false}],                                   // negra con puntillo
  tresC:[{fig:'C',rest:false},{fig:'C',rest:false},{fig:'C',rest:false}], // 3 corcheas
  CN:   [{fig:'C',rest:false},{fig:'N',rest:false}],                 // corchea + negra
  dos:  [{fig:'Cdos',rest:false},{fig:'Cdos',rest:false}],           // dosillo de corcheas (2:3)
};
// Leyenda: como avanzado + 2º pulso variable + dos últimos sistemas en clave de Fa.
function buildLeyenda(seed){
  const rng=mulberry32(seed);
  const key=KEYS[Math.floor(rng()*KEYS.length)];
  const pool=[];
  for(const s of ['s1','s2','s3','s4','bonus']) STRUCT[s].forEach(c=>pool.push(c));
  const shuffled=shuffle(pool,rng).slice(0,20);
  // asignar variante de 2º pulso a cada uno de los 20 compases
  // dosillo: máximo UNA vez en toda la generación
  const dosPos=Math.floor(rng()*20);
  const beat2All=[];
  for(let i=0;i<20;i++){
    if(i===dosPos){ beat2All.push(BEAT2.dos); continue; }
    // entre las otras 3, con la negra c/punt algo más frecuente
    const r=rng();
    beat2All.push(r<0.45?BEAT2.Ndot : r<0.75?BEAT2.tresC : BEAT2.CN);
  }
  const systems={};
  const clefs={};
  ['s1','s2','s3','s4'].forEach((sk,i)=>{
    const cells=shuffled.slice(i*5,i*5+5);
    const b2=beat2All.slice(i*5,i*5+5);
    const bass = i>=2; // los dos últimos sistemas en clave de Fa
    clefs[sk]= bass?'bass':'treble';
    let sys=genSystem(cells,key,rng,true,b2);
    if(bass){ // bajar una octava para tesitura legible en clave de Fa
      sys=sys.map(m=>m.map(e=>e.midi==null?e:Object.assign({},e,{midi:e.midi-12})));
    }
    systems[sk]=sys;
  });
  return {key,systems,noBonus:true,clefs};
}

function setLevel(level){
  currentLevel=level;
  document.querySelectorAll('#levels button').forEach(b=>b.classList.toggle('active',b.dataset.level===level));
  const hint=document.getElementById('hint');
  if(level==='principiante'){
    const model=buildPrincipiante(princKeyIndex);
    hint.textContent='Nivel principiante · '+model.key.name+' · grados conjuntos ascendentes. Pulsa «Generar aleatorio» para cambiar de tonalidad.';
    renderGenZone(model,()=>{
      let ni; do{ ni=Math.floor(Math.random()*KEYS.length); }while(ni===princKeyIndex && KEYS.length>1);
      princKeyIndex=ni; setLevel('principiante');
    });
    renderScore(model,'principiante');
  } else if(level==='intermedio'){
    hint.textContent='Nivel intermedio · tonalidad y melodía variables (hasta 2 alteraciones). Pulsa «Generar aleatorio» para una nueva versión.';
    const model=buildIntermedio(interSeed);
    renderGenZone(model,()=>{interSeed=Math.floor(Math.random()*1e9);setLevel('intermedio');});
    renderScore(model,'intermedio');
  } else if(level==='avanzado'){
    hint.textContent='Nivel avanzado · tonalidad, melodía y ritmos variables. Pulsa «Generar aleatorio» para una nueva versión.';
    const model=buildAvanzado(advSeed);
    renderGenZone(model,()=>{advSeed=Math.floor(Math.random()*1e9);setLevel('avanzado');});
    renderScore(model,'avanzado');
  } else if(level==='leyenda'){
    hint.textContent='Nivel leyenda · ritmos y 2º pulso variables, dos sistemas en clave de fa. Pulsa «Generar aleatorio» para una nueva versión.';
    const model=buildLeyenda(legSeed);
    renderGenZone(model,()=>{legSeed=Math.floor(Math.random()*1e9);setLevel('leyenda');});
    renderScore(model,'leyenda');
  }
}

document.getElementById('levels').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b||b.disabled)return;
  stopMetronome();
  setLevel(b.dataset.level);
});

/* =========================================================
   METRÓNOMO
   ========================================================= */
let BPM=40;
let playing=false;
let audioCtx=null;
let metroTimer=null;
let hiRect=null;
let bonusMeasures=[];
let bonusHi=null;

function clickSound(kind){
  // kind: 'beat' (pulso fuerte), 'count' (cuenta atrás), 'sub' (subdivisión de corchea, suave)
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    let freq, peak, dur;
    if(kind==='sub'){ freq=660; peak=0.12; dur=0.045; }      // subdivisión: grave y suave
    else if(kind==='count'){ freq=1320; peak=0.55; dur=0.09; } // cuenta atrás: fuerte
    else { freq=1320; peak=0.5; dur=0.08; }                    // pulso: fuerte
    o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(peak,audioCtx.currentTime+0.002);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur+0.01);
  }catch(e){}
}
function clearHighlight(){
  if(hiRect&&hiRect.parentNode) hiRect.parentNode.removeChild(hiRect);
  hiRect=null;
}
function highlightMeasure(idx){
  clearHighlight();
  if(idx<0||idx>=MEASURES.length) return;
  const m=MEASURES[idx];
  const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
  // usar la extensión vertical real del SVG (viewBox ya ajustado al contenido)
  let vy=m.y-22, vh=84;
  const vb=m.svg.getAttribute('viewBox');
  if(vb){ const p=vb.split(/\s+/).map(Number); vy=p[1]+4; vh=p[3]-8; }
  r.setAttribute('x',m.x-6);
  r.setAttribute('y',vy);
  r.setAttribute('width',m.w+10);
  r.setAttribute('height',vh);
  r.setAttribute('rx',6); r.setAttribute('class','measure-hi');
  m.svg.insertBefore(r, m.svg.firstChild);
  hiRect=r;
}
function stopMetronome(){
  playing=false;
  if(metroTimer){clearTimeout(metroTimer);metroTimer=null;}
  clearHighlight();
  const overlay=document.getElementById('countin'); if(overlay)overlay.style.display='none';
  const bs=document.getElementById('bonusScreen'); if(bs){bs.style.display='none';bs.classList.remove('playing');}
  if(bonusHi&&bonusHi.parentNode){bonusHi.parentNode.removeChild(bonusHi);bonusHi=null;}
  const pb=document.getElementById('playBtn');
  if(pb){ pb.textContent='▶ Tocar'; pb.classList.remove('playing'); }
}
function startMetronome(){
  if(!MEASURES.length) return;
  playing=true;
  const pb=document.getElementById('playBtn');
  pb.textContent='■ Parar'; pb.classList.add('playing');
  const pulseMs=60000/BPM;        // un pulso = negra con puntillo
  const subMs=pulseMs/3;          // cada corchea = 1/3 del pulso
  const overlay=document.getElementById('countin');
  let countdown=2;
  const tickCountIn=()=>{
    if(!playing) return;
    overlay.style.display='flex'; overlay.textContent=String(countdown);
    clickSound('count');
    setTimeout(()=>{ if(playing)clickSound('sub'); },subMs);
    setTimeout(()=>{ if(playing)clickSound('sub'); },2*subMs);
    countdown--;
    if(countdown>0){ metroTimer=setTimeout(tickCountIn,pulseMs); }
    else { metroTimer=setTimeout(()=>{ overlay.style.display='none'; runMeasure(0,0); }, pulseMs); }
  };
  const runMeasure=(mi,pulse)=>{
    if(!playing) return;
    if(mi>=MEASURES.length){ finishMain(); return; }
    if(pulse===0) highlightMeasure(mi);
    clickSound('beat');
    setTimeout(()=>{ if(playing)clickSound('sub'); },subMs);
    setTimeout(()=>{ if(playing)clickSound('sub'); },2*subMs);
    const nextPulse=pulse+1;
    if(nextPulse<2){ metroTimer=setTimeout(()=>runMeasure(mi,nextPulse),pulseMs); }
    else { metroTimer=setTimeout(()=>runMeasure(mi+1,0),pulseMs); }
  };
  // al terminar los 20 compases: si hay pantalla bonus, mostrarla; si no, parar
  const finishMain=()=>{
    clearHighlight();
    if(CURRENT_MODEL && CURRENT_MODEL.bonusScreen && CURRENT_MODEL.systems.bonus){
      startBonusScreen(pulseMs, subMs);
    } else {
      stopMetronome();
    }
  };
  tickCountIn();
}

// Renderiza el bonus dentro de la pantalla y devuelve los compases (para resaltar)
function renderBonusIntoScreen(model){
  const host=document.getElementById('bsScore');
  host.innerHTML='';
  const renderer=new VF.Renderer(host,VF.Renderer.Backends.SVG);
  const W=460, H=320, sy=150, clefW=64;
  renderer.resize(W,H); const ctx=renderer.getContext();
  const svg=host.querySelector('svg');
  const bm=model.systems.bonus; let bx=8;
  const bw0=Math.floor((W-16-clefW)/2)+clefW, bw1=Math.floor((W-16-clefW)/2);
  const ms=[];
  bm.forEach((m,mi)=>{
    const geo=renderMeasureInto(ctx,bx,sy,mi===0?bw0:bw1,m,model.key,{
      clef:mi===0,time:mi===0,keysig:mi===0,endBar:mi===bm.length-1,
      clefType:(model.clefs&&model.clefs.bonus)||'treble'
    });
    ms.push({svg, x:geo.x, y:sy, w:geo.width});
    bx+=mi===0?bw0:bw1;
  });
  fitSvgToContent(svg, W, 14);
  return ms;
}

function startBonusScreen(pulseMs, subMs){
  const screen=document.getElementById('bonusScreen');
  const count=document.getElementById('bsCount');
  // mostrar la pantalla PRIMERO (si no, getBBox del bonus da 0 y no se ve)
  screen.style.display='flex'; screen.classList.add('playing');
  count.textContent='';
  // render en el siguiente frame, ya con el overlay visible y con dimensiones
  requestAnimationFrame(()=>{
    bonusMeasures=renderBonusIntoScreen(CURRENT_MODEL);
    let countdown=2;
    const tick=()=>{
      if(!playing){ screen.style.display='none'; return; }
      count.textContent=String(countdown);
      clickSound('count');
      setTimeout(()=>{ if(playing)clickSound('sub'); },subMs);
      setTimeout(()=>{ if(playing)clickSound('sub'); },2*subMs);
      countdown--;
      if(countdown>0){ metroTimer=setTimeout(tick,pulseMs); }
      else { metroTimer=setTimeout(()=>{ count.textContent=''; runBonus(0,0,pulseMs,subMs); }, pulseMs); }
    };
    tick();
  });
}
function highlightBonus(idx){
  if(bonusHi&&bonusHi.parentNode) bonusHi.parentNode.removeChild(bonusHi);
  bonusHi=null;
  if(idx<0||idx>=bonusMeasures.length) return;
  const m=bonusMeasures[idx];
  const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',m.x-6); r.setAttribute('y',m.y-22);
  r.setAttribute('width',m.w+10); r.setAttribute('height',40+44);
  r.setAttribute('rx',6); r.setAttribute('class','measure-hi');
  m.svg.insertBefore(r, m.svg.firstChild);
  bonusHi=r;
}
function runBonus(mi,pulse,pulseMs,subMs){
  if(!playing){ document.getElementById('bonusScreen').style.display='none'; return; }
  if(mi>=bonusMeasures.length){
    if(bonusHi&&bonusHi.parentNode)bonusHi.parentNode.removeChild(bonusHi);
    document.getElementById('bonusScreen').style.display='none';
    stopMetronome(); return;
  }
  if(pulse===0) highlightBonus(mi);
  clickSound('beat');
  setTimeout(()=>{ if(playing)clickSound('sub'); },subMs);
  setTimeout(()=>{ if(playing)clickSound('sub'); },2*subMs);
  const np=pulse+1;
  if(np<2){ metroTimer=setTimeout(()=>runBonus(mi,np,pulseMs,subMs),pulseMs); }
  else { metroTimer=setTimeout(()=>runBonus(mi+1,0,pulseMs,subMs),pulseMs); }
}
function updateBpm(d){
  BPM=Math.max(30,Math.min(200,BPM+d));
  document.getElementById('bpm').textContent=BPM;
}
document.getElementById('tempoDown').addEventListener('click',()=>updateBpm(-5));
document.getElementById('tempoUp').addEventListener('click',()=>updateBpm(5));
document.getElementById('playBtn').addEventListener('click',()=>{
  if(playing) stopMetronome(); else startMetronome();
});

let resizeTimer=null;
window.addEventListener('resize',()=>{
  stopMetronome();
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>setLevel(currentLevel),150);
});
setLevel('principiante');
</script>
